<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT → MP3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    /* ── Reset & base ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0c0c0e;
      --surface: #141418;
      --surface2: #1c1c22;
      --border: #2a2a33;
      --accent: #e8ff47;
      --accent2: #47b8ff;
      --err: #ff5757;
      --ok: #47ffb8;
      --text: #e8e8f0;
      --muted: #5a5a6e;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --r: 8px;
    }

    html {
      font-size: 15px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Scanline overlay ── */
    body::before {
      content: '';
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(255, 255, 255, 0.012) 2px,
          rgba(255, 255, 255, 0.012) 4px);
      z-index: 9999;
    }

    /* ── Layout ── */
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .logo {
      font-family: var(--mono);
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--accent);
    }

    .logo span {
      color: var(--accent2);
    }

    .tagline {
      font-size: 0.78rem;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Input card ── */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .input-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.6rem;
      display: block;
    }

    .url-row {
      display: flex;
      gap: 0.75rem;
    }

    .url-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.82rem;
      padding: 0.7rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .url-input::placeholder {
      color: var(--muted);
    }

    .url-input:focus {
      border-color: var(--accent);
    }

    .btn {
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.7rem 1.3rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: #0c0c0e;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.88;
    }

    .btn-dl {
      background: var(--accent2);
      color: #0c0c0e;
    }

    .btn-dl:hover:not(:disabled) {
      opacity: 0.88;
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover:not(:disabled) {
      color: var(--text);
      border-color: var(--text);
    }

    /* ── Error banner ── */
    .error-banner {
      background: rgba(255, 87, 87, 0.08);
      border: 1px solid rgba(255, 87, 87, 0.35);
      border-radius: var(--r);
      color: var(--err);
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 0.85rem 1rem;
      margin-bottom: 1rem;
      display: none;
    }

    /* ── Info card (playlist/single meta) ── */
    .info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.2rem 1.5rem;
      margin-bottom: 1rem;
      display: none;
    }

    .info-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .info-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .info-sub {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .info-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
    }

    .pill.playlist {
      border-color: var(--accent);
      color: var(--accent);
    }

    .pill.single {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* ── Track list ── */
    .track-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .track-list::-webkit-scrollbar {
      width: 4px;
    }

    .track-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .track-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .track-item {
      display: grid;
      grid-template-columns: 22px 44px 1fr auto auto;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface2);
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 0.6rem 0.85rem;
      transition: border-color 0.15s;
      cursor: pointer;
    }

    .track-item:hover {
      border-color: var(--border);
    }

    .track-item.selected {
      border-color: rgba(232, 255, 71, 0.3);
      background: rgba(232, 255, 71, 0.04);
    }

    .track-item.downloading {
      border-color: rgba(71, 184, 255, 0.4);
    }

    .track-item.done {
      border-color: rgba(71, 255, 184, 0.35);
    }

    .track-item.error {
      border-color: rgba(255, 87, 87, 0.35);
    }

    .track-cb {
      accent-color: var(--accent);
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .track-thumb {
      width: 44px;
      height: 33px;
      border-radius: 4px;
      object-fit: cover;
      background: var(--border);
      flex-shrink: 0;
    }

    .track-thumb-placeholder {
      width: 44px;
      height: 33px;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    .track-info {
      min-width: 0;
    }

    .track-title {
      font-size: 0.83rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .track-uploader {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: 1px;
    }

    .track-dur {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .track-status {
      font-family: var(--mono);
      font-size: 0.68rem;
      white-space: nowrap;
      min-width: 54px;
      text-align: right;
    }

    .track-status.idle {
      color: var(--muted);
    }

    .track-status.queued {
      color: var(--muted);
    }

    .track-status.active {
      color: var(--accent2);
    }

    .track-status.convert {
      color: var(--accent);
    }

    .track-status.done {
      color: var(--ok);
    }

    .track-status.err {
      color: var(--err);
    }

    /* ── Progress bar inside track ── */
    .track-progress-wrap {
      grid-column: 3 / -1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    .track-progress-bar {
      height: 100%;
      background: var(--accent2);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .track-item.downloading .track-progress-wrap {
      display: block;
    }

    .track-item.done .track-progress-wrap {
      display: block;
    }

    .track-item.done .track-progress-bar {
      width: 100%;
      background: var(--ok);
    }

    /* ── Download actions bar ── */
    .dl-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .dl-bar-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .select-count {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── Overall progress ── */
    .overall-progress {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1rem 1.5rem;
      margin-bottom: 1rem;
      display: none;
    }

    .op-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }

    .op-label {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .op-count {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent);
    }

    .op-bar-wrap {
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }

    .op-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 3px;
      width: 0%;
      transition: width 0.4s ease;
    }

    .op-status {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Files tab ── */
    .files-section {
      margin-top: 2rem;
      display: none;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem 1rem;
    }

    .file-icon {
      font-size: 1rem;
      flex-shrink: 0;
    }

    .file-name {
      flex: 1;
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-size {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Loading state on fetch ── */
    .fetching-indicator {
      display: none;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.75rem;
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .url-row {
        flex-direction: column;
      }

      .track-item {
        grid-template-columns: 18px 1fr auto auto;
      }

      .track-thumb,
      .track-thumb-placeholder {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- Header -->
    <header>
      <div class="logo">YT<span>→</span>MP3</div>
      <div class="tagline">YouTube &amp; YT Music Downloader</div>
    </header>

    <!-- URL input -->
    <div class="input-card">
      <label class="input-label" for="urlInput">Paste URL — video, playlist, YouTube Music</label>
      <div class="url-row">
        <input id="urlInput" class="url-input" type="text"
          placeholder="https://www.youtube.com/watch?v=… or playlist?list=…" />
        <button class="btn btn-primary" id="fetchBtn" onclick="fetchInfo()">Fetch</button>
      </div>
      <div class="fetching-indicator" id="fetchingIndicator">
        <span class="spinner"></span> Fetching metadata…
      </div>
    </div>

    <!-- Error -->
    <div class="error-banner" id="errorBanner"></div>

    <!-- Overall download progress -->
    <div class="overall-progress" id="overallProgress">
      <div class="op-header">
        <span class="op-label">Downloading</span>
        <span class="op-count" id="opCount">0 / 0</span>
      </div>
      <div class="op-bar-wrap">
        <div class="op-bar" id="opBar"></div>
      </div>
      <div class="op-status" id="opStatus">—</div>
    </div>

    <!-- Info / track list -->
    <div class="info-card" id="infoCard">
      <div class="info-meta">
        <div>
          <div class="info-title" id="infoTitle">—</div>
          <div class="info-sub" id="infoSub">—</div>
        </div>
        <div class="info-actions">
          <span class="pill" id="typePill">—</span>
        </div>
      </div>

      <div class="track-list" id="trackList"></div>

      <div class="dl-bar" id="dlBar">
        <div class="dl-bar-left">
          <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer">
            <input type="checkbox" id="selectAll" class="track-cb" onchange="toggleAll(this.checked)" />
            <span class="select-count" id="selectCount">0 selected</span>
          </label>
        </div>
        <div style="display:flex;gap:0.5rem">
          <button class="btn btn-ghost" onclick="clearResults()">Clear</button>
          <button class="btn btn-dl" id="dlBtn" onclick="startDownload()" disabled>
            ↓ Download MP3
          </button>
        </div>
      </div>
    </div>

    <!-- (downloaded files go directly to user device) -->

  </div>

  <script>
    // ── State ──────────────────────────────────────
    let tracks = [];      // [{id,title,url,duration,thumbnail,uploader}]
    let trackState = {};  // url → 'idle'|'queued'|'downloading'|'converting'|'done'|'error'
    let currentPlaylistTitle = '';
    let currentPlaylistThumbnail = '';
    let currentType = 'single'; // 'single' | 'playlist'

    // ── Helpers ───────────────────────────────────
    function show(id) { document.getElementById(id).style.display = 'flex'; }
    function showB(id) { document.getElementById(id).style.display = 'block'; }
    function hide(id) { document.getElementById(id).style.display = 'none'; }
    function el(id) { return document.getElementById(id); }

    function fmtBytes(b) {
      if (b < 1024) return b + ' B';
      if (b < 1024 ** 2) return (b / 1024).toFixed(1) + ' KB';
      return (b / 1024 ** 2).toFixed(1) + ' MB';
    }

    function showError(msg) {
      const banner = el('errorBanner');
      banner.textContent = '⚠ ' + msg;
      banner.style.display = 'block';
    }
    function clearError() { el('errorBanner').style.display = 'none'; }

    // ── Enter key ─────────────────────────────────
    el('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') fetchInfo(); });

    // ── Fetch metadata ────────────────────────────
    async function fetchInfo() {
      const url = el('urlInput').value.trim();
      if (!url) return;

      clearError();
      hide('infoCard');

      el('fetchBtn').disabled = true;
      show('fetchingIndicator');

      try {
        const res = await fetch('/api/info', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await res.json();

        if (!res.ok || data.error) {
          showError(data.error || 'Failed to fetch info.');
          return;
        }

        tracks = data.tracks || [];
        trackState = {};
        selected.clear();
        tracks.forEach(t => {
          trackState[t.url] = 'idle';
          selected.add(t.url);
        });
        currentPlaylistTitle = data.type === 'playlist' ? (data.title || '') : '';
        currentPlaylistThumbnail = data.thumbnail || '';
        currentType = data.type || 'single';

        el('infoTitle').textContent = data.title || 'Unknown';
        el('infoSub').textContent =
          (data.uploader ? data.uploader + ' · ' : '') +
          data.count + ' track' + (data.count !== 1 ? 's' : '');

        const pill = el('typePill');
        if (data.type === 'playlist') {
          pill.textContent = '▤ Playlist';
          pill.className = 'pill playlist';
        } else {
          pill.textContent = '♪ Single';
          pill.className = 'pill single';
        }

        renderTracks();
        showB('infoCard');
        updateDlBar();
      } catch (err) {
        showError('Network error: ' + err.message);
      } finally {
        el('fetchBtn').disabled = false;
        hide('fetchingIndicator');
      }
    }

    // ── Render tracks ─────────────────────────────
    function renderTracks() {
      const list = el('trackList');
      list.innerHTML = '';

      tracks.forEach((t, i) => {
        const state = trackState[t.url] || 'idle';
        const checked = isSelected(t.url);

        const item = document.createElement('div');
        item.className = 'track-item' + (checked ? ' selected' : '');
        if (state === 'downloading') item.classList.add('downloading');
        if (state === 'done') item.classList.add('done');
        if (state === 'error') item.classList.add('error');
        item.dataset.url = t.url;
        item.onclick = (e) => {
          if (e.target.type === 'checkbox') return;
          toggleTrack(t.url);
        };

        const thumb = t.thumbnail
          ? `<img class="track-thumb" src="${t.thumbnail}" loading="lazy" onerror="this.style.display='none'" />`
          : `<div class="track-thumb-placeholder">♪</div>`;

        const statusMap = {
          idle: '',
          queued: '· queued',
          downloading: '⬇',
          converting: '⚙ mp3',
          done: '✓ done',
          error: '✗ error'
        };
        const statusClass = state;

        item.innerHTML = `
      <input type="checkbox" class="track-cb" ${checked ? 'checked' : ''}
        onclick="event.stopPropagation();toggleTrack('${t.url}')" />
      ${thumb}
      <div class="track-info">
        <div class="track-title" title="${escHtml(t.title)}">${escHtml(t.title)}</div>
        ${t.uploader ? `<div class="track-uploader">${escHtml(t.uploader)}</div>` : ''}
      </div>
      <div class="track-dur">${t.duration || ''}</div>
      <div class="track-status ${statusClass}" data-url="${t.url}">${statusMap[state] || ''}</div>
      <div class="track-progress-wrap" data-url="${t.url}">
        <div class="track-progress-bar" data-url="${t.url}" style="width:${state === 'done' ? 100 : 0}%"></div>
      </div>
    `;

        list.appendChild(item);
      });

      // Select-all state
      const all = tracks.every(t => isSelected(t.url));
      const some = tracks.some(t => isSelected(t.url));
      el('selectAll').checked = all;
      el('selectAll').indeterminate = some && !all;
    }

    // ── Selection ─────────────────────────────────
    const selected = new Set();

    function isSelected(url) { return selected.has(url); }

    function toggleTrack(url) {
      if (selected.has(url)) selected.delete(url);
      else selected.add(url);
      updateTrackUI(url);
      updateDlBar();
    }

    function toggleAll(on) {
      tracks.forEach(t => { if (on) selected.add(t.url); else selected.delete(t.url); });
      renderTracks();
      updateDlBar();
    }

    function updateDlBar() {
      const bar = el('dlBar');
      bar.style.display = 'flex';
      el('selectCount').textContent = selected.size + ' selected';
      el('dlBtn').disabled = selected.size === 0;
      const all = tracks.every(t => isSelected(t.url));
      const some = tracks.some(t => isSelected(t.url));
      el('selectAll').checked = all;
      el('selectAll').indeterminate = some && !all;
    }

    function updateTrackUI(url) {
      const isChecked = selected.has(url);
      const item = document.querySelector(`.track-item[data-url="${CSS.escape(url)}"]`);
      if (item) {
        item.classList.toggle('selected', isChecked);
        const cb = item.querySelector('.track-cb');
        if (cb) cb.checked = isChecked;
      }

      const selectAllCb = el('selectAll');
      if (selectAllCb && tracks.length > 0) {
        const all = tracks.every(t => isSelected(t.url));
        const some = tracks.some(t => isSelected(t.url));
        selectAllCb.checked = all;
        selectAllCb.indeterminate = some && !all;
      }
    }

    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Download ──────────────────────────────────
    let dlSession = null;

    async function startDownload() {
      const urls = [...selected];
      if (!urls.length) return;

      el('dlBtn').disabled = true;
      clearError();

      // Mark all selected as queued
      urls.forEach(url => { trackState[url] = 'queued'; });
      renderTracks();

      // Build title map
      const titlesMap = {};
      tracks.forEach(t => { titlesMap[t.url] = t.title; });

      // Only treat as a playlist bundle (→ zip with folder) when every track
      // is selected. A partial selection downloads as individual MP3s instead.
      const allSelected = tracks.length > 0 && tracks.every(t => selected.has(t.url));
      const effectivePlaylistTitle = (currentType === 'playlist' && allSelected)
        ? currentPlaylistTitle : '';
      const effectivePlaylistThumbnail = effectivePlaylistTitle ? currentPlaylistThumbnail : '';

      const sessionId = crypto.randomUUID();
      dlSession = sessionId;

      // Start overall progress
      const totalCount = urls.length;
      let doneCount = 0;
      showOverallProgress(doneCount, totalCount, '—');

      // POST to start download
      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            urls,
            titles: titlesMap,
            session_id: sessionId,
            playlist_title: effectivePlaylistTitle,
            playlist_thumbnail: effectivePlaylistThumbnail,
          })
        });
        if (!res.ok) {
          const d = await res.json();
          showError(d.error || 'Failed to start download.');
          return;
        }
      } catch (err) {
        showError('Network error: ' + err.message);
        return;
      }

      // Listen to SSE progress
      const sse = new EventSource(`/api/progress/${sessionId}`);

      sse.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === 'keepalive') return;

        if (msg.type === 'started') {
          trackState[msg.url] = 'downloading';
          updateTrackItemState(msg.url, 'downloading', '⬇', 0);
          updateOverallStatus(msg.title || msg.url, doneCount, totalCount);
        }

        if (msg.type === 'progress') {
          trackState[msg.url] = 'downloading';
          const pct = msg.percent || 0;
          const speed = msg.speed ? ` · ${msg.speed}` : '';
          updateTrackItemState(msg.url, 'downloading', `⬇ ${Math.round(pct)}%`, pct);
          updateOverallStatus((msg.title || msg.url) + speed, doneCount, totalCount);
        }

        if (msg.type === 'converting') {
          trackState[msg.url] = 'converting';
          updateTrackItemState(msg.url, 'converting', '⚙ mp3', 99);
        }

        if (msg.type === 'track_done') {
          doneCount++;
          trackState[msg.url] = 'done';
          updateTrackItemState(msg.url, 'done', '✓ done', 100);
          showOverallProgress(doneCount, totalCount, msg.title || msg.url);
          // Single track: trigger browser Save dialog immediately
          if (msg.filename && msg.session_id) {
            triggerDownload(
              `/api/serve/${encodeURIComponent(msg.session_id)}/${encodeURIComponent(msg.filename)}`,
              msg.filename
            );
          }
        }

        if (msg.type === 'zipping') {
          updateOverallStatus('⚙ Zipping playlist…', doneCount, totalCount);
        }

        if (msg.type === 'zip_ready') {
          // Fetch the zip from the server, unpack it in memory with JSZip,
          // then trigger one Save dialog per MP3 — no zip ever touches the device.
          updateOverallStatus('⬇ Unpacking files…', doneCount, totalCount);
          unpackAndDownload(
            `/api/serve-zip/${encodeURIComponent(msg.session_id)}`,
            msg.filename,
            (done, total, name) => updateOverallStatus(`⬇ Saving ${name} (${done}/${total})…`, doneCount, totalCount)
          );
        }

        if (msg.type === 'track_error') {
          doneCount++;
          trackState[msg.url] = 'error';
          updateTrackItemState(msg.url, 'error', '✗ err', 0);
          showOverallProgress(doneCount, totalCount, '⚠ Error: ' + (msg.title || msg.url));
        }

        if (msg.type === 'all_done') {
          sse.close();
          el('dlBtn').disabled = false;
          const doneMsg = (effectivePlaylistTitle && !isMobile)
            ? 'All done ✓ — unzip the file to find your playlist folder'
            : 'All done ✓ — check your Downloads folder';
          updateOverallStatus(doneMsg, totalCount, totalCount);
        }

        if (msg.type === 'error') {
          sse.close();
          showError(msg.message || 'Stream error');
          el('dlBtn').disabled = false;
        }
      };

      sse.onerror = () => {
        sse.close();
        el('dlBtn').disabled = false;
      };
    }

    // ── Platform detection ────────────────────────
    // iOS Safari and desktop Safari don't support <a download> on blob URLs —
    // files open inline in the browser instead of saving.
    // For those platforms we fall back to serving the zip directly so the
    // browser's own download mechanism handles it.
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    const useFallbackZip = isSafari || isIOS;

    // ── Single file download ───────────────────────
    function triggerDownload(url, filename) {
      const a = document.createElement('a');
      a.href = url;
      a.download = filename || 'download';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // ── Playlist: fetch zip → unpack in browser → save each file ──────────────
    // On Safari/iOS blob URLs don't trigger Save dialogs, so we serve the zip
    // directly instead — the browser's native download handles it.
    // On other browsers, files are saved one at a time with a short delay so
    // the browser doesn't block rapid-fire download attempts.
    async function unpackAndDownload(zipUrl, zipFilename, onProgress) {
      if (useFallbackZip) {
        // Safari / iOS: navigate directly to the zip — Content-Disposition: attachment
        // makes the browser save it without opening it in a new tab.
        updateOverallStatus('⬇ Downloading zip…', 0, 1);
        window.location.href = zipUrl;
        return;
      }

      try {
        // Fetch the zip as a binary blob
        const resp = await fetch(zipUrl);
        if (!resp.ok) throw new Error(`Server error ${resp.status}`);
        const blob = await resp.blob();

        // Load into JSZip
        const zip = await JSZip.loadAsync(blob);

        // Collect all files, MP3s first then cover image
        const entries = [];
        zip.forEach((relativePath, file) => {
          if (!file.dir) entries.push({ relativePath, file });
        });

        // Sort: MP3s alphabetically, then cover image last
        entries.sort((a, b) => {
          const aIsMp3 = a.relativePath.endsWith('.mp3');
          const bIsMp3 = b.relativePath.endsWith('.mp3');
          if (aIsMp3 && !bIsMp3) return -1;
          if (!aIsMp3 && bIsMp3) return 1;
          return a.relativePath.localeCompare(b.relativePath);
        });

        const total = entries.length;
        for (let i = 0; i < entries.length; i++) {
          const { relativePath, file } = entries[i];
          // Use just the filename (no folder prefix in the save name)
          const filename = relativePath.split('/').pop();
          if (onProgress) onProgress(i + 1, total, filename);

          const fileBlob = await file.async('blob');
          const objUrl = URL.createObjectURL(fileBlob);
          triggerDownload(objUrl, filename);

          // Revoke after a short delay so browser finishes the request
          setTimeout(() => URL.revokeObjectURL(objUrl), 5000);

          // Stagger saves: give the browser 400ms between each file
          if (i < entries.length - 1) {
            await new Promise(r => setTimeout(r, 400));
          }
        }
      } catch (err) {
        showError('Failed to unpack files: ' + err.message);
      }
    }

    function updateTrackItemState(url, stateClass, statusText, pct) {
      const item = document.querySelector(`.track-item[data-url="${CSS.escape(url)}"]`);
      if (!item) return;
      item.className = 'track-item' + (selected.has(url) ? ' selected' : '') + ' ' + stateClass;
      const statusEl = item.querySelector(`.track-status[data-url="${CSS.escape(url)}"]`);
      if (statusEl) { statusEl.className = `track-status ${stateClass}`; statusEl.textContent = statusText; }
      const barEl = item.querySelector(`.track-progress-bar[data-url="${CSS.escape(url)}"]`);
      if (barEl) barEl.style.width = pct + '%';
    }

    // ── Overall progress ──────────────────────────
    function showOverallProgress(done, total, label) {
      showB('overallProgress');
      const pct = total > 0 ? (done / total) * 100 : 0;
      el('opBar').style.width = pct + '%';
      el('opCount').textContent = done + ' / ' + total;
      el('opStatus').textContent = label;
    }
    function updateOverallStatus(label, done, total) {
      el('opStatus').textContent = label;
      if (total > 0) {
        el('opBar').style.width = (done / total * 100) + '%';
        el('opCount').textContent = done + ' / ' + total;
      }
    }

    // ── Clear ─────────────────────────────────────
    function clearResults() {
      tracks = [];
      trackState = {};
      selected.clear();
      currentPlaylistTitle = '';
      currentPlaylistThumbnail = '';
      currentType = 'single';
      hide('infoCard');
      hide('overallProgress');
      el('urlInput').value = '';
      clearError();
    }

    // ── Init ──────────────────────────────────────
  </script>
</body>

</html>
