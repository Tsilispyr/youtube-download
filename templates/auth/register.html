{% extends "base.html" %}
{% block title %}Register — AudioWeb{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 3rem auto; padding: 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;">
  <h1 style="font-size: 1.2rem; margin-bottom: 1rem;">Register</h1>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <p style="color: {% if cat == 'error' %}var(--err){% else %}var(--ok){% endif %}; margin-bottom: 0.5rem;">{{ msg }}</p>
    {% endfor %}
  {% endwith %}
  <form method="post">
    <label style="display:block; margin-bottom: 0.5rem; font-size: 0.85rem;">Email</label>
    <input type="email" name="email" required style="width:100%; padding: 0.5rem; margin-bottom: 1rem; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px;" />
    <label style="display:block; margin-bottom: 0.5rem; font-size: 0.85rem;">Display name (optional)</label>
    <input type="text" name="display_name" style="width:100%; padding: 0.5rem; margin-bottom: 1rem; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px;" />
    <label style="display:block; margin-bottom: 0.5rem; font-size: 0.85rem;">Password</label>
    <input type="password" name="password" required style="width:100%; padding: 0.5rem; margin-bottom: 1rem; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px;" />
    <button type="submit" style="display:block; margin-top: 1rem; padding: 0.6rem 1.2rem; background: var(--accent); color: var(--bg); border: none; border-radius: 4px; cursor: pointer;">Register</button>
  </form>
</div>
{% endblock %}
