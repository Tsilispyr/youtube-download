<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AudioWeb{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0e; --surface: #141418; --surface2: #1c1c22;
      --border: #2a2a33; --accent: #e8ff47; --accent2: #47b8ff;
      --err: #ff5757; --ok: #47ffb8; --text: #e8e8f0; --muted: #5a5a6e;
      --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
    .nav { padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    .nav a { color: var(--muted); text-decoration: none; font-family: var(--mono); font-size: 0.8rem; }
    .nav a:hover { color: var(--accent); }
    .nav .user { margin-left: auto; color: var(--muted); font-size: 0.8rem; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <a href="/AudioWeb/yt-download/">Download</a>
    <a href="/AudioWeb/equalizer/">Equalizer</a>
    <a href="/AudioWorld/Player/">Player</a>
    {% if current_user.is_authenticated %}
      <span class="user">{{ current_user.email }}</span>
      <a href="/AudioWeb/logout">Logout</a>
    {% else %}
      <a href="/AudioWeb/login">Login</a>
      <a href="/AudioWeb/register">Register</a>
    {% endif %}
  </nav>
  {% block content %}{% endblock %}
</body>
</html>
